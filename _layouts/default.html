<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; frame-src https://www.youtube.com; img-src 'self' data:;">
  {% seo %}
</head>
<body>
  <div class="mobile-nav">
    <a href="{{ site.baseurl }}/" class="mobile-nav-logo">AI Reference</a>
    <button class="mobile-menu-btn" id="menuBtn" aria-label="메뉴">☰</button>
  </div>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  {% include nav.html %}

  <div class="main-content">
    <main>{{ content }}</main>
  </div>

  <script>
    (function() {
      var t = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();

    function updateThemeBtns(t) {
      document.querySelectorAll('.theme-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.theme === t);
      });
    }

    document.addEventListener('DOMContentLoaded', function() {
      var t = localStorage.getItem('theme') || 'light';
      updateThemeBtns(t);

      document.querySelectorAll('.theme-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var next = btn.dataset.theme;
          document.documentElement.setAttribute('data-theme', next);
          localStorage.setItem('theme', next);
          updateThemeBtns(next);
        });
      });

      var menuBtn = document.getElementById('menuBtn');
      var sidebar = document.getElementById('sidebar');
      var overlay = document.getElementById('sidebarOverlay');

      function toggleSidebar() {
        sidebar.classList.toggle('open');
        overlay.classList.toggle('open');
      }

      if (menuBtn) menuBtn.addEventListener('click', toggleSidebar);
      if (overlay) overlay.addEventListener('click', toggleSidebar);

      // Code Block Copy Button
      document.querySelectorAll('.post-content pre').forEach(function(pre) {
        var wrapper = document.createElement('div');
        wrapper.className = 'code-wrapper';
        pre.parentNode.insertBefore(wrapper, pre);
        wrapper.appendChild(pre);

        var btn = document.createElement('button');
        btn.className = 'copy-btn';
        btn.textContent = 'Copy';
        wrapper.appendChild(btn);

        btn.addEventListener('click', function() {
          var code = pre.querySelector('code').innerText;
          navigator.clipboard.writeText(code).then(function() {
            btn.textContent = 'Copied!';
            setTimeout(function() { btn.textContent = 'Copy'; }, 2000);
          });
        });
      });
    });
  </script>
  <script src="{{ site.baseurl }}/assets/js/simple-jekyll-search.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Initialize Search
      SimpleJekyllSearch({
        searchInput: document.getElementById('searchInput'),
        resultsContainer: document.getElementById('searchResults'),
        json: '{{ site.baseurl }}/search.json',
        searchResultTemplate: '<a href="{url}" class="search-result-item"><span class="search-result-title">{title}</span><span class="search-result-meta">{category} · {date}</span></a>',
        noResultsText: '<div class="search-result-item"><span class="search-result-meta">결과를 찾을 수 없습니다.</span></div>'
      });

      // Keyboard Shortcut (⌘K or Ctrl+K)
      document.addEventListener('keydown', function(e) {
        if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
          e.preventDefault();
          var input = document.getElementById('searchInput');
          if (input) {
            input.focus();
            // If sidebar is closed on mobile, open it
            var sidebar = document.getElementById('sidebar');
            if (sidebar && !sidebar.classList.contains('open') && window.innerWidth <= 840) {
              sidebar.classList.add('open');
              document.getElementById('sidebarOverlay').classList.add('open');
            }
          }
        }
      });
    });
  </script>
</body>
</html>
