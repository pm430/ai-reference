<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; frame-src https://www.youtube.com; img-src 'self' data:;">
  {% seo %}
</head>
<body data-baseurl="{{ site.baseurl }}">
  <div class="progress-container">
    <div class="progress-bar" id="progressBar"></div>
  </div>
  <div class="mobile-nav">
    <a href="{{ site.baseurl }}/" class="mobile-nav-logo">AI Reference</a>
    <button class="mobile-menu-btn" id="menuBtn" aria-label="메뉴" aria-expanded="false" aria-controls="sidebar">☰</button>
  </div>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  {% include nav.html %}

  <div class="main-content">
    <main>{{ content }}</main>
  </div>

  <button class="back-to-top" id="backToTop" aria-label="맨 위로">↑</button>

  <div class="search-modal" id="searchModal" role="dialog" aria-modal="true" aria-label="검색">
    <div class="search-modal-content">
      <div class="search-modal-header">
        <span class="search-icon">⌕</span>
        <input type="text" id="modalSearchInput" placeholder="검색어를 입력하세요..." autocomplete="off">
      </div>
      <div class="search-modal-results" id="modalSearchResults"></div>
      <div class="search-modal-footer">
        <span><kbd>↵</kbd> 선택</span>
        <span><kbd>↑</kbd><kbd>↓</kbd> 이동</span>
        <span><kbd>Esc</kbd> 닫기</span>
      </div>
    </div>
  </div>

  <script src="{{ site.baseurl }}/assets/js/simple-jekyll-search.min.js"></script>
  <script src="{{ site.baseurl }}/assets/js/app.js" defer></script>
</body>
</html>
